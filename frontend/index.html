<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScrapeGPT</title>
    <script>
      (function () {
        try {
          var s = localStorage.getItem("scrapegpt-theme");
          // Dark-first: default to the premium dark theme unless the user chose light.
          var dark = s ? s === "dark" : true;
          if (dark) document.documentElement.classList.add("dark");
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
